name: Android Build

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '11'

      - name: Set up Gradle 7.6.1
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '7.6.1'

      - name: Build debug APK
        run: gradle --no-daemon --stacktrace assembleDebug

      - name: Prepare APK artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/NotificationBandit-debug.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: NotificationBandit-debug-${{ github.run_number }}
          path: dist/NotificationBandit-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish tagged GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          RELEASE_APK="dist/NotificationBandit-${TAG}-debug.apk"
          cp dist/NotificationBandit-debug.apk "$RELEASE_APK"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$RELEASE_APK" --clobber
          else
            gh release create "$TAG" "$RELEASE_APK" \
              --title "Notification Bandit ${TAG}" \
              --generate-notes
          fi
